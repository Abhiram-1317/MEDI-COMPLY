---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medi-comply-guardrail
  namespace: medi-comply
  labels:
    app: medi-comply
    component: guardrail
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medi-comply
      component: guardrail
  template:
    metadata:
      labels:
        app: medi-comply
        component: guardrail
        tier: backend
    spec:
      serviceAccountName: medi-comply-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: guardrail
          image: medicomply/guardrail:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8002
              name: http
          envFrom:
            - configMapRef:
                name: medi-comply-config
            - secretRef:
                name: medi-comply-secrets
          env:
            - name: GUARDRAIL_MODE
              value: "strict"
            - name: GUARDRAIL_LAYERS
              value: "3,4,5"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 10
