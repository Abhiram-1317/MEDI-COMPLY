---
apiVersion: v1
kind: Secret
metadata:
  name: medi-comply-secrets
  namespace: medi-comply
  labels:
    app: medi-comply
type: Opaque
stringData:
  # Database
  POSTGRES_USER: "medicomply"
  POSTGRES_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  DATABASE_URL: "postgresql://medicomply:CHANGE_ME_IN_PRODUCTION@postgres-service:5432/medicomply"
  
  # Redis
  REDIS_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  REDIS_URL: "redis://:CHANGE_ME_IN_PRODUCTION@redis-service:6379/0"
  
  # LLM API
  LLM_API_KEY: "CHANGE_ME_TO_REAL_KEY"
  
  # Auth
  JWT_SECRET_KEY: "CHANGE_ME_RANDOM_SECRET_256BIT"
  JWT_REFRESH_SECRET: "CHANGE_ME_ANOTHER_RANDOM_SECRET"
  
  # Encryption
  PHI_ENCRYPTION_KEY: "CHANGE_ME_AES256_KEY"
