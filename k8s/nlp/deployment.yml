---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medi-comply-nlp
  namespace: medi-comply
  labels:
    app: medi-comply
    component: nlp
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medi-comply
      component: nlp
  template:
    metadata:
      labels:
        app: medi-comply
        component: nlp
        tier: backend
    spec:
      serviceAccountName: medi-comply-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: nlp
          image: medicomply/nlp:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
              name: http
          envFrom:
            - configMapRef:
                name: medi-comply-config
            - secretRef:
                name: medi-comply-secrets
          env:
            - name: NLP_MODEL_PATH
              value: "/models"
            - name: NLP_BATCH_SIZE
              value: "8"
            - name: NLP_MAX_DOCUMENT_LENGTH
              value: "50000"
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: models-volume
              mountPath: /models
              readOnly: true
            - name: tmp-volume
              mountPath: /tmp
      volumes:
        - name: models-volume
          persistentVolumeClaim:
            claimName: nlp-models-pvc
        - name: tmp-volume
          emptyDir:
            sizeLimit: 500Mi
