---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: medi-comply
  labels:
    app: medi-comply
    component: postgres
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medi-comply
      component: postgres
  strategy:
    type: Recreate  # No rolling update for databases
  template:
    metadata:
      labels:
        app: medi-comply
        component: postgres
        tier: database
    spec:
      securityContext:
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "medicomply"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: medi-comply-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: medi-comply-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
            - name: POSTGRES_INITDB_ARGS
              value: "--data-checksums --encoding=UTF8"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - medicomply
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - medicomply
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data-pvc
