---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data-pvc
  namespace: medi-comply
  labels:
    app: medi-comply
    component: postgres
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3-encrypted  # AWS encrypted storage
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: audit-logs-pvc
  namespace: medi-comply
  labels:
    app: medi-comply
    component: audit
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: efs-encrypted  # Shared filesystem
  resources:
    requests:
      storage: 100Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nlp-models-pvc
  namespace: medi-comply
  labels:
    app: medi-comply
    component: nlp
spec:
  accessModes:
    - ReadOnlyMany
  storageClassName: gp3-encrypted
  resources:
    requests:
      storage: 20Gi
