---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: medi-comply
  labels:
    app: medi-comply
    component: redis
    tier: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medi-comply
      component: redis
  template:
    metadata:
      labels:
        app: medi-comply
        component: redis
        tier: cache
    spec:
      securityContext:
        runAsUser: 999
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
            - --maxmemory
            - 256mb
            - --maxmemory-policy
            - allkeys-lru
            - --appendonly
            - "yes"
          ports:
            - containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: medi-comply-secrets
                  key: REDIS_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
