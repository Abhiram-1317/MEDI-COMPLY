---
apiVersion: v1
kind: ConfigMap
metadata:
  name: medi-comply-config
  namespace: medi-comply
  labels:
    app: medi-comply
data:
  # Application
  APP_NAME: "MEDI-COMPLY"
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  
  # LLM
  LLM_MODEL_NAME: "gpt-4o"
  LLM_TEMPERATURE: "0.1"
  LLM_MAX_TOKENS: "4096"
  LLM_PROVIDER: "azure_openai"
  
  # Guardrails
  GUARDRAIL_CONFIDENCE_THRESHOLD: "0.85"
  GUARDRAIL_MAX_RETRIES: "3"
  GUARDRAIL_ESCALATION_THRESHOLD: "0.7"
  
  # Knowledge Base
  KNOWLEDGE_VECTOR_DB_URL: "http://chroma-service:8000"
  KNOWLEDGE_BASE_VERSION: "KB-2025-Q1-v3"
  
  # Audit
  AUDIT_RETENTION_DAYS: "2555"
  AUDIT_HASH_ALGORITHM: "sha256"
  
  # Security
  SECURITY_ENABLE_PHI_DETECTION: "true"
  SECURITY_ENABLE_PROMPT_INJECTION_DETECTION: "true"
  CORS_ALLOWED_ORIGINS: "https://app.medicomply.com"
  
  # Rate Limiting
  RATE_LIMIT_GLOBAL_PER_MINUTE: "1000"
  RATE_LIMIT_PER_USER_PER_MINUTE: "100"
  RATE_LIMIT_CODING_PER_MINUTE: "20"
  
  # Session
  SESSION_TIMEOUT_MINUTES: "15"
  MAX_FAILED_LOGIN_ATTEMPTS: "5"
  ACCOUNT_LOCKOUT_MINUTES: "30"
