name: MEDI-COMPLY CI Pipeline

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  APP_NAME: "MEDI-COMPLY"
  ENVIRONMENT: "test"
  LOG_LEVEL: "WARNING"
  LLM_API_KEY: "test-key-not-real"
  GUARDRAIL_CONFIDENCE_THRESHOLD: "0.85"
  GUARDRAIL_MAX_RETRIES: "3"
  SECURITY_ENABLE_PHI_DETECTION: "true"
  SECURITY_ENABLE_PROMPT_INJECTION_DETECTION: "true"

jobs:

  lint:
    name: "🔍 Lint & Format"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy

      - name: Check formatting with Black
        run: |
          black --check --diff medi_comply/ || echo "::warning::Black formatting issues found"
        continue-on-error: true

      - name: Check import sorting with isort
        run: |
          isort --check-only --diff medi_comply/ || echo "::warning::Import sorting issues found"
        continue-on-error: true

      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names
          flake8 medi_comply/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warnings (non-blocking)
          flake8 medi_comply/ --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics

      - name: Type check with mypy (non-blocking)
        run: |
          mypy medi_comply/ --ignore-missing-imports --no-error-summary || echo "::warning::Type check issues found"
        continue-on-error: true

  test:
    name: "🧪 Tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r medi_comply/requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-timeout httpx

      - name: Run all tests with coverage
        run: |
          python -m pytest medi_comply/tests/ \
            -v \
            --timeout=60 \
            --cov=medi_comply \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-report=term-missing \
            --tb=short \
            -x \
            2>&1 | tee test_output.txt
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Check test count
        run: |
          TOTAL=$(grep -oP '\\d+ passed' test_output.txt | head -1 | grep -oP '\\d+')
          echo "Total tests passed: $TOTAL"
          if [ -z "$TOTAL" ] || [ "$TOTAL" -lt 100 ]; then
            echo "::warning::Less than 100 tests passed. Expected 1000+"
          fi
          echo "test_count=$TOTAL" >> $GITHUB_ENV

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 14

      - name: Upload coverage XML
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Check coverage threshold
        if: matrix.python-version == '3.11'
        run: |
          python -m pytest medi_comply/tests/ \
            --cov=medi_comply \
            --cov-fail-under=60 \
            --no-header \
            -q \
            2>&1 || echo "::warning::Coverage below 60% threshold"
        continue-on-error: true

  guardrail-tests:
    name: "🛡️ Guardrail Tests"
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r medi_comply/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run adversarial tests
        run: |
          python -m pytest medi_comply/tests/test_coding_api_adversarial.py -v --tb=short 2>&1 | tee adversarial_results.txt
        env:
          PYTHONPATH: ${{ github.workspace }}
        continue-on-error: true

      - name: Run guardrail penetration tests
        run: |
          python -m pytest medi_comply/tests/test_guardrail_penetration.py -v --tb=short 2>&1 | tee penetration_results.txt
        env:
          PYTHONPATH: ${{ github.workspace }}
        continue-on-error: true

      - name: Run calibration tests
        run: |
          python -m pytest medi_comply/tests/test_calibration.py -v --tb=short 2>&1 | tee calibration_results.txt
        env:
          PYTHONPATH: ${{ github.workspace }}
        continue-on-error: true

      - name: Run compliance scenario tests
        run: |
          python -m pytest medi_comply/tests/test_compliance_scenarios.py -v --tb=short 2>&1 | tee compliance_results.txt
        env:
          PYTHONPATH: ${{ github.workspace }}
        continue-on-error: true

      - name: Guardrail Summary
        run: |
          echo "## 🛡️ Guardrail Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          
          for file in adversarial penetration calibration compliance; do
            if [ -f "${file}_results.txt" ]; then
              PASSED=$(grep -oP '\\d+ passed' "${file}_results.txt" | head -1 || echo "0 passed")
              FAILED=$(grep -oP '\\d+ failed' "${file}_results.txt" | head -1 || echo "0 failed")
              echo "| ${file} | ${PASSED}, ${FAILED} |" >> $GITHUB_STEP_SUMMARY
            fi
          done

  api-smoke-test:
    name: "🌐 API Smoke Test"
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r medi_comply/requirements.txt
          pip install httpx uvicorn

      - name: Start API server
        run: |
          cd medi_comply
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 5
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Check API health
        run: |
          curl -f http://localhost:8000/docs || echo "::warning::Swagger docs not accessible"

      - name: Test coding endpoint
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:8000/api/v1/coding/process \
            -H "Content-Type: application/json" \
            -d '{"clinical_document": "ASSESSMENT: 1. Essential hypertension 2. Type 2 diabetes", "encounter_type": "outpatient"}')
          echo "Coding endpoint: HTTP $RESPONSE"
          if [ "$RESPONSE" != "200" ]; then
            echo "::error::Coding endpoint returned $RESPONSE"
            exit 1
          fi

      - name: Test knowledge endpoint
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:8000/api/v1/knowledge/icd10/search?q=diabetes")
          echo "Knowledge endpoint: HTTP $RESPONSE"

      - name: Test compliance dashboard
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/v1/compliance/dashboard)
          echo "Compliance dashboard: HTTP $RESPONSE"

      - name: Stop server
        run: |
          kill $(lsof -t -i:8000) 2>/dev/null || true

  build:
    name: "🐳 Docker Build"
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Dockerfile exists
        run: |
          if [ -f "medi_comply/Dockerfile" ] || [ -f "Dockerfile" ]; then
            echo "Dockerfile found"
          else
            echo "::warning::No Dockerfile found, skipping build"
            exit 0
          fi

      - name: Build Docker image
        run: |
          if [ -f "medi_comply/Dockerfile" ]; then
            docker build -t medi-comply:test -f medi_comply/Dockerfile medi_comply/
          elif [ -f "Dockerfile" ]; then
            docker build -t medi-comply:test .
          fi
        continue-on-error: true

  ci-summary:
    name: "📊 CI Summary"
    runs-on: ubuntu-latest
    needs: [lint, test, guardrail-tests, api-smoke-test, build]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## 🏥 MEDI-COMPLY CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Format | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Guardrail Tests | ${{ needs.guardrail-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Smoke Test | ${{ needs.api-smoke-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
