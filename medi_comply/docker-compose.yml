# ---------------------------------------------------------------------------
# MEDI-COMPLY — Docker Compose (full stack)
# ---------------------------------------------------------------------------

services:
  # ── Application ─────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medi-comply-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: medi-comply-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── PostgreSQL ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: medi-comply-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: medi
      POSTGRES_PASSWORD: medi
      POSTGRES_DB: medi_comply
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medi -d medi_comply"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Neo4j ───────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: medi-comply-neo4j
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/medicomplyadmin
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 30s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
  pg_data:
  neo4j_data:
